name: Build precompiled NIFs

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-gnu,       os: ubuntu-latest }
          - { target: aarch64-linux-gnu,      os: ubuntu-latest }
          - { target: aarch64-macos-none,     os: macos-latest }

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Build NIF artifact
        shell: bash
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          QUICKBEAM_BUILD=1 mix zigler_precompiled.build lib/quickbeam/native.ex \
            --target "${{ matrix.target }}" \
            --out artifacts

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz
